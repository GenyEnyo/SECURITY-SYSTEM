<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Incident · M Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/brand.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
</head>
<body data-page="add-incident" data-crumbs='[{"label":"Incidents","href":"incidents.html"},{"label":"Add"}]'>

  <div class="app">
    <aside class="app-sidebar" data-shell="sidebar"></aside>

    <div class="app-main">
      <header class="app-topbar" data-shell="topbar"></header>

      <main class="app-content">

        <!-- ============================================================
             Page head — title 36px, "Back" button top right (matches Figma)
             ============================================================ -->
        <div class="page-head">
          <div>
            <h1 class="page-title">Add Incident</h1>
            <p class="page-subtitle">Report incidents on this form</p>
          </div>
          <div class="actions">
            <a class="btn btn-primary" href="incidents.html"><i class="bi bi-arrow-left me-2"></i>Back</a>
          </div>
        </div>

        <!-- ============================================================
             Form — two-column grid (Bootstrap row/col), 82px tall inputs,
             dropzone for attachments, save (green) + cancel (red) bottom-left.
             ============================================================ -->
        <form onsubmit="event.preventDefault(); window.mNotify('Incident saved','success'); setTimeout(()=>location.href='incidents.html',900);">

          <div class="row g-4">

            <!-- Incident type — DROPDOWN -->
            <div class="col-lg-6">
              <label class="field-label" for="f-type">Incident Type</label>
              <select id="f-type" class="brand-input brand-select" required>
                <option value="" selected disabled>Select incident type...</option>
                <option>Break in</option>
                <option>Theft</option>
                <option>Injury</option>
                <option>Damage</option>
                <option>Item Loss</option>
                <option>Other</option>
              </select>
            </div>

            <!-- Date and Time -->
            <div class="col-lg-6">
              <label class="field-label" for="f-date">Date and Time</label>
              <div class="position-relative">
                <input id="f-date" type="datetime-local" class="brand-input" required>
                <i class="bi bi-calendar-event position-absolute" style="right:22px;top:50%;transform:translateY(-50%);font-size:24px;pointer-events:none;"></i>
              </div>
            </div>

            <!-- Location — DROPDOWN -->
            <div class="col-lg-6">
              <label class="field-label" for="f-loc">Location</label>
              <select id="f-loc" class="brand-input brand-select" required>
                <option value="" selected disabled>Select your location...</option>
                <option>Accra</option><option>Akuse</option><option>Aboadze</option>
                <option>Akosombo</option><option>Tema</option><option>Head Office</option>
              </select>
            </div>

            <!-- Severity / Priority — DROPDOWN -->
            <div class="col-lg-6">
              <label class="field-label" for="f-sev">Severity / Priority Level</label>
              <select id="f-sev" class="brand-input brand-select" required>
                <option value="" selected disabled>Select priority level...</option>
                <option>Low</option><option>Medium</option><option>High</option><option>Urgent</option>
              </select>
            </div>

            <!-- Reporting Officer — AUTO-FILLED, read-only -->
            <div class="col-lg-6">
              <label class="field-label" for="f-officer">Reporting Officer <span class="muted fw-5" style="font-size:14px;">(auto-filled)</span></label>
              <input id="f-officer" class="brand-input readonly" value="Kwasi Ansah" readonly>
            </div>

            <!-- Status — default Reported -->
            <div class="col-lg-6">
              <label class="field-label" for="f-status">Status</label>
              <select id="f-status" class="brand-input brand-select">
                <option selected>Reported</option>
                <option>Reviewing</option><option>Resolved</option>
                <option>Escalated</option><option>Closed</option>
              </select>
            </div>

            <!-- Description — TEXTAREA -->
            <div class="col-12">
              <label class="field-label" for="f-desc">Description</label>
              <textarea id="f-desc" class="brand-input" rows="4" placeholder="The issue I want to report is..."></textarea>
            </div>

            <!-- Attachment — DROPZONE -->
            <div class="col-12">
              <label class="field-label">Upload attachment <span class="muted fw-5" style="font-size:14px;">(.png, .jpg, .pdf, .docx — not more than 5MB)</span></label>
              <div class="brand-dropzone">
                <i class="bi bi-cloud-arrow-up"></i>
                <div class="dz-label">
                  <div class="fw-7" style="font-size:16px;">Drop a file here, or click to browse</div>
                  <div class="muted fw-5" style="font-size:14px;">Max 5MB · PNG, JPG, PDF, DOCX</div>
                </div>
                <input type="file" accept=".png,.jpg,.jpeg,.pdf,.docx" hidden>
              </div>
            </div>
          </div>

          <!-- Action row — Save (green) on left, Cancel (red) next to it -->
          <div class="d-flex gap-3 mt-5">
            <button type="submit" class="btn btn-success btn-lg">
              <i class="bi bi-check-lg me-2"></i>Save
            </button>
            <a href="incidents.html" class="btn btn-danger btn-lg">
              <i class="bi bi-x-lg me-2"></i>Cancel
            </a>
          </div>

        </form>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
