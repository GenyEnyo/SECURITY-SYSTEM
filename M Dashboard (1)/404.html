<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page not found · M Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/brand.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height: 100vh; padding: 40px; }
    .nf-wrap { max-width: 560px; width:100%; text-align: center; }
    .nf-code {
      font-size: 140px; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--brand-primary) 0%, var(--brand-primary-600) 55%, var(--brand-primary-700) 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
      margin: 0;
    }
    .nf-title { font-size: 28px; font-weight: 700; margin: 6px 0 10px; }
    .nf-blurb { color: var(--text-muted); font-size: 14px; font-weight: 500; max-width: 460px; margin: 0 auto 24px; }
  </style>
</head>
<body>

  <div class="nf-wrap">
    <i class="bi bi-shield-slash" style="font-size:46px;color:var(--brand-primary);opacity:.8;"></i>
    <h1 class="nf-code">404</h1>
    <h2 class="nf-title">We couldn't find that post.</h2>
    <p class="nf-blurb">The page you tried to reach doesn't exist, was moved, or your access level doesn't permit it. Try one of the routes below.</p>

    <div class="d-flex gap-2 justify-content-center flex-wrap">
      <a href="dashboard.html" class="btn btn-primary"><i class="bi bi-house me-2"></i>Back to dashboard</a>
      <a href="incidents.html" class="btn btn-outline-primary"><i class="bi bi-shield-exclamation me-2"></i>Incidents</a>
      <button class="btn btn-link muted" onclick="history.back()"><i class="bi bi-arrow-left me-2"></i>Go back</button>
    </div>

    <div class="muted mt-5" style="font-size:12px;">
      Need help? Email <a href="mailto:support@m-dashboard.app">support@m-dashboard.app</a>
    </div>
  </div>

</body>
</html>
