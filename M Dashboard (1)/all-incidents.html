<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>All incidents · M Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="assets/css/brand.css" rel="stylesheet">
  <link href="assets/css/components.css" rel="stylesheet">
</head>
<body data-page="all-incidents" data-crumbs='[{"label":"Records"},{"label":"All incidents"}]'>

  <div class="app">
    <aside class="app-sidebar" data-shell="sidebar"></aside>
    <div class="app-main">
      <header class="app-topbar" data-shell="topbar"></header>
      <main class="app-content">

        <div class="page-head">
          <div>
            <h1 class="page-title">All incidents <span class="muted fw-5" style="font-size:13px;">(Head of Security view)</span></h1>
            <p class="page-subtitle">Every incident across all officers and locations</p>
          </div>
          <div class="actions">
            <button class="btn btn-outline-primary"><i class="bi bi-file-earmark-excel me-2"></i>Export</button>
          </div>
        </div>

        <!-- Filter pills -->
        <div class="toolbar">
          <div class="d-flex gap-2 align-items-center" style="font-size:13px;">
            <span class="muted fw-7">Status:</span>
            <button class="btn btn-sm btn-primary">All</button>
            <button class="btn btn-sm btn-outline-primary">Reported</button>
            <button class="btn btn-sm btn-outline-primary">Reviewing</button>
            <button class="btn btn-sm btn-outline-primary">Escalated</button>
            <button class="btn btn-sm btn-outline-primary">Resolved</button>
            <button class="btn btn-sm btn-outline-primary">Closed</button>
          </div>
          <div class="spacer"></div>
          <div class="search-shadow"><i class="bi bi-search"></i><input placeholder="search...">
          </div>
        </div>

        <!-- Bulk actions when checked -->
        <div id="bulk-bar" class="alert d-none align-items-center justify-content-between mb-2"
             style="background:var(--brand-primary-soft); border:1px solid var(--brand-primary); padding:10px 14px; border-radius:8px;">
          <div class="fw-7" style="font-size:13px;"><span id="bulk-count">0</span> selected</div>
          <div class="d-flex gap-2">
            <button class="btn btn-sm btn-warning"><i class="bi bi-arrow-up-circle me-1"></i>Escalate</button>
            <button class="btn btn-sm btn-success"><i class="bi bi-check-lg me-1"></i>Mark resolved</button>
            <button class="btn btn-sm btn-outline-primary"><i class="bi bi-archive me-1"></i>Close</button>
          </div>
        </div>

        <!-- Table — includes Reported by column -->
        <table class="brand-table">
          <thead>
            <tr>
              <th style="width:40px;"><input type="checkbox" id="check-all"></th>
              <th>No.</th>
              <th>Date</th>
              <th>Incident Type</th>
              <th>Location</th>
              <th>Reported by</th>
              <th>Status</th>
              <th>Severity</th>
              <th class="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody id="all-tbody"></tbody>
        </table>

        <div class="brand-pagination">
          <div class="page-of">Page 1 of 6</div>
          <div class="rows-pill">8</div>
          <div class="rpp">rows per page</div>
          <div class="pager">
            <div class="pg label">Previous</div>
            <div class="pg active">1</div><div class="pg">2</div><div class="pg">…</div>
            <div class="pg">5</div><div class="pg">6</div>
            <div class="pg label">Next</div>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/partials.js"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const rows = [
      [1,'14/09/26','Theft','Akosombo','Kwasi Ansah','escalated','urgent'],
      [2,'10/10/26','Damage','Aboadze','Adwoa Mensah','reviewing','medium'],
      [3,'23/10/26','Injury','Accra','Esi Owusu','resolved','low'],
      [4,'05/11/26','Item loss','Akuse','Kojo Anane','reported','low'],
      [5,'12/11/26','Trespass','Head Office','Nii Quaye','escalated','high'],
      [6,'18/11/26','Fight','Tema Office','Ofori Atta','reviewing','high'],
      [7,'21/11/26','Equipment damage','Engineering Bldg.','Adwoa Mensah','reviewing','medium'],
      [8,'28/11/26','Suspicious package','Reception','Yaw Mensah','resolved','medium'],
    ];
    const sevMap = { low:'pill-low', medium:'pill-medium', high:'pill-high', urgent:'pill-urgent' };
    const stMap  = { reported:'pill-reported', reviewing:'pill-reviewing', resolved:'pill-resolved', escalated:'pill-escalated', closed:'pill-closed' };
    const tb = document.getElementById('all-tbody');
    rows.forEach(r => {
      tb.innerHTML += `<tr>
        <td><input type="checkbox" class="row-check"></td>
        <td class="fw-7">${r[0]}</td>
        <td>${r[1]}</td>
        <td>${r[2]}</td>
        <td>${r[3]}</td>
        <td><div class="d-flex align-items-center gap-2">
          <div class="avatar" style="width:24px;height:24px;font-size:10px;">${r[4].split(' ').map(s=>s[0]).join('').slice(0,2)}</div>
          <span class="fw-7" style="font-size:12.5px;">${r[4]}</span>
        </div></td>
        <td><span class="pill ${stMap[r[5]]}">${r[5][0].toUpperCase()+r[5].slice(1)}</span></td>
        <td><span class="pill ${sevMap[r[6]]}">${r[6][0].toUpperCase()+r[6].slice(1)}</span></td>
        <td><div class="row-actions">
          <a class="ra-btn" href="view-incident.html"><i class="bi bi-eye"></i></a>
          <a class="ra-btn" href="add-incident.html"><i class="bi bi-pencil-square"></i></a>
          <button class="ra-btn danger"><i class="bi bi-trash"></i></button>
        </div></td>
      </tr>`;
    });
    // Bulk select wiring
    const ca = document.getElementById('check-all');
    ca.addEventListener('change', () => {
      document.querySelectorAll('.row-check').forEach(c => c.checked = ca.checked);
      updateBulk();
    });
    document.addEventListener('change', e => { if (e.target.matches('.row-check')) updateBulk(); });
    function updateBulk() {
      const n = document.querySelectorAll('.row-check:checked').length;
      const bar = document.getElementById('bulk-bar');
      document.getElementById('bulk-count').textContent = n;
      bar.classList.toggle('d-none', n === 0);
      bar.classList.toggle('d-flex', n > 0);
    }
  </script>
</body>
</html>
